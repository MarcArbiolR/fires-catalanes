<div class="container py-5">
  <h1 class="mb-4">★ Les Meves Fires Favorites</h1>
  
  <div *ngIf="favorites().length === 0" class="alert alert-info">
    <p>Encara no tens favorits. <a href="#" [routerLink]="['/browse']">Explora fires</a> i afegeix els teus favorits!</p>
  </div>

  <div *ngIf="favorites().length > 0" class="row">
    <div class="col-md-12">
      <div class="table-responsive">
        <table class="table table-hover">
          <thead class="table-danger">
            <tr>
              <th>Activitat</th>
              <th>Comarca</th>
              <th>Municipi</th>
              <th>Data</th>
              <th>Acció</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let fair of favorites()">
              <td><strong>{{ fair.activityName }}</strong></td>
              <td>{{ fair.regionName }}</td>
              <td>{{ fair.municipalityName }}</td>
              <td>{{ fair.date }}</td>
              <td>
                <button class="btn btn-sm btn-danger" (click)="removeFavorite(fair)">
                  Treure ★
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
